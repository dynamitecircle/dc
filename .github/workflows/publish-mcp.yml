# Publish the server.json metadata to the Official MCP Registry on every v* tag.
#
# Kept in a SEPARATE workflow from publish.yml on purpose: a registry hiccup
# (it's in preview) must never block or fail the PyPI release. This lists the
# HOSTED MCP endpoint (api.dynamitecircle.com/mcp) under the GitHub-OIDC-verified
# namespace `io.github.dynamitecircle/dc` — no stored secrets needed.
name: Publish to MCP Registry

on:
  push:
    tags: ["v*"]

jobs:
  publish-mcp:
    name: Publish server.json to MCP Registry
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # GitHub OIDC — authorizes the io.github.dynamitecircle/* namespace
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Install mcp-publisher
        run: |
          curl -L "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" | tar xz mcp-publisher
      - name: Authenticate (GitHub OIDC)
        run: ./mcp-publisher login github-oidc
      - name: Publish to MCP Registry
        run: ./mcp-publisher publish
