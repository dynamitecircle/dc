# Build the wheel + sdist on every push, publish to PyPI on every v* tag.
#
# Uses OIDC trusted publishing — no PyPI API tokens stored in GitHub.
# To enable, configure trusted publishing on PyPI:
#   https://pypi.org/manage/account/publishing/
# with: project=dynamitecircle, owner=dynamitecircle, repo=dc,
# workflow=publish.yml, environment=pypi.

name: Publish to PyPI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    name: Build wheel + sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install build tooling
        run: python -m pip install --upgrade build
      - name: Build distributions
        run: python -m build
      - name: Verify wheel layout
        run: |
          python -m zipfile -l dist/*.whl
          test -f dist/*.whl
          test -f dist/*.tar.gz
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  smoke-install:
    name: Smoke-test pip install
    needs: build
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.9", "3.12"]
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install from wheel
        shell: bash
        run: pip install dist/*.whl
      - name: Import smoke test
        run: python -c "from dynamitecircle import DC, DCError, Result, Runtime, main; print('OK', DC.__name__)"
      - name: CLI smoke test (no API call)
        shell: bash
        run: |
          dc help | head -5
          # `dc help <command>` exercises subcommand-help dispatch
          # without making any network calls.
          dc help setup | head -3

  publish:
    name: Publish to PyPI
    needs: [build, smoke-install]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/dynamitecircle
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish via OIDC trusted publishing
        uses: pypa/gh-action-pypi-publish@release/v1

  github-release:
    name: Create GitHub Release
    needs: publish
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Extract release notes from CHANGELOG
        id: notes
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          # Grab the section between `## [VERSION]` and the next `## [`
          awk -v v="$VERSION" '
            $0 ~ "^## \\[" v "\\]" { capture=1; next }
            capture && /^## \[/ { exit }
            capture { print }
          ' CHANGELOG.md > release-notes.md
          if [ ! -s release-notes.md ]; then
            echo "Release ${TAG}" > release-notes.md
            echo "" >> release-notes.md
            echo "See [CHANGELOG.md](CHANGELOG.md) for details." >> release-notes.md
          fi
      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF#refs/tags/}" \
            --title "${GITHUB_REF#refs/tags/}" \
            --notes-file release-notes.md \
            dist/*.whl dist/*.tar.gz
